{% extends "base.html" %}

{% block content %}
<div class="subnav">
    <a href="{{ url_for('nutrition.index') }}">Log</a>
    <a href="{{ url_for('nutrition.ingredients_index') }}">Ingredients</a>
    <a href="{{ url_for('nutrition.meals_index') }}">Meals</a>
</div>

<h1>Nutrition tracker</h1>
<p>Log what you eat. Pick a saved meal or add ingredients directly.</p>

<div id="nutrition-error">
    {% include "partials/nutrition_error.html" %}
</div>

<section class="card">
    <h2>Log a meal</h2>
    <form method="post" action="{{ url_for('nutrition.create_log') }}"
        hx-post="{{ url_for('nutrition.create_log') }}"
        hx-target="#nutrition-error"
        hx-swap="innerHTML"
        id="log-nutrition-form">

        <label>
            Date
            <input type="date" name="logged_on" value="{{ default_logged_on }}" />
        </label>

        <label>
            Time
            <select name="time_bucket">
                <option value="morning" {% if default_time_bucket=='morning' %}selected{% endif %}>Morning (5am–12pm)</option>
                <option value="afternoon" {% if default_time_bucket=='afternoon' %}selected{% endif %}>Afternoon (12pm–5pm)</option>
                <option value="night" {% if default_time_bucket=='night' %}selected{% endif %}>Night (5pm–5am)</option>
            </select>
        </label>

        <label>
            Saved meal (optional)
            <select name="meal_id" id="meal-select">
                <option value="">— none —</option>
                {% for m in meals %}
                <option value="{{ m.id }}">{{ m.name }}</option>
                {% endfor %}
            </select>
        </label>

        <div id="ingredient-rows">
            <h3>Ingredients</h3>
            <div class="ingredient-row-template" style="display:none">
                <div class="ingredient-row">
                    <select name="ingredient_id" class="ingredient-select">
                        <option value="">Choose…</option>
                        {% for ing in ingredients %}
                        <option value="{{ ing.id }}">{{ ing.name }}</option>
                        {% endfor %}
                    </select>
                    <input type="number" name="servings" value="1" min="0.1" step="0.1" placeholder="servings" />
                    <button type="button" class="button--ghost remove-row-btn">Remove</button>
                </div>
            </div>
            <div id="ingredient-rows-container"></div>
            <button type="button" id="add-ingredient-btn" class="button--ghost">+ Add ingredient</button>
        </div>

        <label>
            Notes
            <textarea name="notes" rows="2"></textarea>
        </label>

        <button type="submit">Log meal</button>
    </form>
</section>

{% include "partials/nutrition_recent_list.html" %}

<script>
(function () {
    const mealSelect = document.getElementById("meal-select");
    const container = document.getElementById("ingredient-rows-container");
    const addBtn = document.getElementById("add-ingredient-btn");
    const template = document.querySelector(".ingredient-row-template .ingredient-row");

    function addRow(ingredientId, servings) {
        const row = template.cloneNode(true);
        if (ingredientId) {
            row.querySelector(".ingredient-select").value = ingredientId;
        }
        if (servings) {
            row.querySelector("input[name='servings']").value = servings;
        }
        row.querySelector(".remove-row-btn").addEventListener("click", function () {
            row.remove();
        });
        container.appendChild(row);
    }

    addBtn.addEventListener("click", function () {
        addRow("", "1");
    });

    // Auto-populate from meal selection
    mealSelect.addEventListener("change", function () {
        const mealId = mealSelect.value;
        if (!mealId) return;
        fetch("{{ url_for('nutrition.meal_json', meal_id='__MEAL_ID__') }}".replace("__MEAL_ID__", mealId))
            .then(r => r.json())
            .then(data => {
                container.innerHTML = "";
                if (data.ingredients) {
                    data.ingredients.forEach(function (mi) {
                        addRow(mi.ingredient_id, mi.servings);
                    });
                }
            });
    });

    // Start with one empty row
    addRow("", "1");

    window.nutritionLogForm = {
        reset: function () {
            mealSelect.selectedIndex = 0;
            container.innerHTML = "";
            addRow("", "1");
        }
    };
})();
</script>
{% endblock %}
