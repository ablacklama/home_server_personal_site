{% extends "base.html" %}

{% block content %}
<div class="subnav">
    <a href="{{ url_for('nutrition.index') }}">Log</a>
    <a href="{{ url_for('nutrition.ingredients_index') }}">Ingredients</a>
    <a href="{{ url_for('nutrition.meals_index') }}">Meals</a>
</div>

<h1>Edit Ingredient</h1>

{% if error is defined and error %}
<div class="alert alert--error">{{ error }}</div>
{% endif %}

<section class="card">
    <form method="post"
          action="{{ url_for('nutrition.edit_ingredient', ingredient_id=ingredient.id) }}"
          hx-post="{{ url_for('nutrition.edit_ingredient', ingredient_id=ingredient.id) }}"
          hx-target="main" hx-select="main > *" hx-swap="innerHTML">

        <label>
            Name
            <input type="text" name="name" required value="{{ ingredient.name }}" />
        </label>

        <label>
            Serving size
            <input type="text" name="serving_size" value="{{ ingredient.serving_size or '' }}" placeholder="e.g. 100g, 1 cup" />
        </label>

        <div class="form-grid">
            <label>
                Calories
                <input type="number" name="calories" min="0" step="0.1" value="{{ ingredient.calories if ingredient.calories is not none else '' }}" />
            </label>
            <label>
                Protein (g)
                <input type="number" name="protein_g" min="0" step="0.1" value="{{ ingredient.protein_g if ingredient.protein_g is not none else '' }}" />
            </label>
            <label>
                Carbs (g)
                <input type="number" name="carbs_g" min="0" step="0.1" value="{{ ingredient.carbs_g if ingredient.carbs_g is not none else '' }}" />
            </label>
            <label>
                Fat (g)
                <input type="number" name="fat_g" min="0" step="0.1" value="{{ ingredient.fat_g if ingredient.fat_g is not none else '' }}" />
            </label>
            <label>
                Fiber (g)
                <input type="number" name="fiber_g" min="0" step="0.1" value="{{ ingredient.fiber_g if ingredient.fiber_g is not none else '' }}" />
            </label>
            <label>
                Sugar (g)
                <input type="number" name="sugar_g" min="0" step="0.1" value="{{ ingredient.sugar_g if ingredient.sugar_g is not none else '' }}" />
            </label>
            <label>
                Caffeine (mg)
                <input type="number" name="caffeine_mg" min="0" step="0.1" value="{{ ingredient.caffeine_mg if ingredient.caffeine_mg is not none else '' }}" />
            </label>
        </div>

        <div class="form-row">
            <button type="submit" class="btn btn--primary">Save Changes</button>
            <a href="{{ url_for('nutrition.ingredients_index') }}" class="btn">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
