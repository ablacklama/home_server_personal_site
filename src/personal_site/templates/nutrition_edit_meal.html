{% extends "base.html" %}

{% block content %}
<div class="subnav">
    <a href="{{ url_for('nutrition.index') }}">Log</a>
    <a href="{{ url_for('nutrition.ingredients_index') }}">Ingredients</a>
    <a href="{{ url_for('nutrition.meals_index') }}">Meals</a>
</div>

<h1>Edit Meal</h1>

{% if error is defined and error %}
<div class="alert alert--error">{{ error }}</div>
{% endif %}

<section class="card">
    <form method="post"
          action="{{ url_for('nutrition.edit_meal', meal_id=meal.id) }}"
          hx-post="{{ url_for('nutrition.edit_meal', meal_id=meal.id) }}"
          hx-target="main" hx-select="main > *" hx-swap="innerHTML"
          id="edit-meal-form">

        <label>
            Name
            <input type="text" name="name" required value="{{ meal.name }}" />
        </label>

        <div id="meal-ingredient-rows">
            <h3>Ingredients</h3>
            <div class="ingredient-row-template" style="display:none">
                <div class="ingredient-row">
                    <select name="ingredient_id" class="ingredient-select">
                        <option value="">Choose...</option>
                        {% for ing in ingredients %}
                        <option value="{{ ing.id }}">{{ ing.name }}</option>
                        {% endfor %}
                    </select>
                    <input type="number" name="servings" value="1" min="0.1" step="0.1" placeholder="servings" />
                    <button type="button" class="button--ghost remove-row-btn">Remove</button>
                </div>
            </div>
            <div id="meal-ingredient-rows-container"></div>
            <button type="button" id="meal-add-ingredient-btn" class="button--ghost">+ Add ingredient</button>
        </div>

        <label>
            Notes
            <textarea name="notes" rows="2">{{ meal.notes or '' }}</textarea>
        </label>

        <div class="form-row">
            <button type="submit" class="btn btn--primary">Save Changes</button>
            <a href="{{ url_for('nutrition.meals_index') }}" class="btn">Cancel</a>
        </div>
    </form>
</section>

<script>
(function () {
    const container = document.getElementById("meal-ingredient-rows-container");
    const addBtn = document.getElementById("meal-add-ingredient-btn");
    const template = document.querySelector(".ingredient-row-template .ingredient-row");

    function addRow(ingredientId, servings) {
        const row = template.cloneNode(true);
        if (ingredientId) {
            row.querySelector(".ingredient-select").value = ingredientId;
        }
        if (servings) {
            row.querySelector("input[name='servings']").value = servings;
        }
        row.querySelector(".remove-row-btn").addEventListener("click", function () {
            row.remove();
        });
        container.appendChild(row);
    }

    addBtn.addEventListener("click", function () { addRow(); });

    // Pre-populate existing meal ingredients
    var existing = {{ meal.ingredients | map(attribute='ingredient_id') | list | tojson }};
    var existingServings = {{ meal.ingredients | map(attribute='servings') | list | tojson }};
    for (var i = 0; i < existing.length; i++) {
        addRow(existing[i], existingServings[i]);
    }

    // If no existing ingredients, add one empty row
    if (existing.length === 0) {
        addRow();
    }
})();
</script>
{% endblock %}
