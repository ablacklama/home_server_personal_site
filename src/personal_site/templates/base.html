<!doctype html>
<html lang="en" data-theme="midnight">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{% if title %}{{ title }} · {% endif %}Personal Site</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
  <meta name="theme-color" content="#0b0b1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <script defer src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="{{ url_for('static', filename='js/site.js') }}"></script>
  {% block head_extra %}{% endblock %}
</head>

<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{{ url_for('index') }}">Personal Site</a>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a class="nav-link" href="{{ url_for('workouts.index') }}">Workouts</a>
        <a class="nav-link" href="{{ url_for('sleep.index') }}">Sleep</a>
        <a class="nav-link" href="{{ url_for('nutrition.index') }}">Nutrition</a>
        <a class="nav-link" href="{{ url_for('chat.index') }}">Chat</a>
        <a class="nav-link" href="{{ url_for('stats.index') }}">Stats</a>
        <a class="nav-link" href="{{ url_for('preferences.index') }}">Prefs</a>
        <label class="theme-switch">
          <span class="theme-switch__label">Theme</span>
          <select data-theme-switcher>
            <option value="midnight">Midnight</option>
            <option value="ember">Ember</option>
            <option value="sage">Sage</option>
            <option value="wave">Wave</option>
          </select>
        </label>
      </div>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>Hosted on my home server.</small>
    </div>
  </footer>
</body>

</html>
